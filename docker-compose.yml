version: "3.9"

services:
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: rigguard-api
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      DB_HOST: ${DB_HOST:-localhost}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-rigguard}
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_SSL: ${DB_SSL:-true}
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey_change_in_production}
      PREDICTION_SERVICE_URL: http://prediction:8000
    depends_on:
      - prediction
    restart: unless-stopped
    networks:
      - rigguard-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  prediction:
    build:
      context: ./services/prediction
      dockerfile: Dockerfile
    container_name: rigguard-prediction
    ports:
      - "8000:8000"
    environment:
      DB_HOST: ${DB_HOST:-localhost}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-rigguard}
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
    restart: unless-stopped
    networks:
      - rigguard-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
        VITE_PREDICTION_URL: ${VITE_PREDICTION_URL:-http://localhost:8000}
    container_name: rigguard-frontend
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - rigguard-net

networks:
  rigguard-net:
    driver: bridge
