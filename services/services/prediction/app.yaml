apiVersion: apps/v1
kind: Deployment
metadata:
  name: prediction
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prediction
  template:
    metadata:
      labels:
        app: prediction
    spec:
      containers:
        - name: prediction
          image: rigguard-prediction
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: prediction
spec:
  selector:
    app: prediction
  type: LoadBalancer
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30002