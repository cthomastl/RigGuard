apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: rigguard-api
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: DB_HOST
              value: "database-1.czymaq4wobwh.us-east-2.rds.amazonaws.com"
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: "rigguard"
            - name: DB_USER
              value: "admin"
            - name: DB_PASSWORD
              value: "1232123Ct"
            - name: DB_SSL
              value: "true"
            - name: NODE_ENV
              value: "dev"
            - name: JWT_SECRET
              value: "7ueddiidismsikikdiei43w"
---
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector:
    app: api
  type: NodePort
  ports:
    - port: 3001
      targetPort: 3001
      nodePort: 30001
