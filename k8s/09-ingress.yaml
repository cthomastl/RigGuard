# nginx Ingress Controller (installed via Helm)
#
# Path routing:
#   /api/*          → rigguard-api:3001
#   /predictions/*  → rigguard-prediction:8000
#   /*              → rigguard-frontend:80
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rigguard-ingress
  namespace: rigguard
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: rigguard-api
                port:
                  number: 3001
          - path: /predictions
            pathType: Prefix
            backend:
              service:
                name: rigguard-prediction
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rigguard-frontend
                port:
                  number: 80
