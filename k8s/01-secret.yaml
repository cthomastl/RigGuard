# IMPORTANT: Replace all <base64-encoded-*> placeholders before applying.
# Encode values with: echo -n "your-value" | base64
#
# Recommended: Store these in AWS Secrets Manager and use the
# AWS Secrets and Config Provider (ASCP) sidecar instead.
apiVersion: v1
kind: Secret
metadata:
  name: rigguard-secret
  namespace: rigguard
type: Opaque
data:
  DB_HOST: <base64-encoded-rds-endpoint>
  DB_PASSWORD: <base64-encoded-db-password>
  JWT_SECRET: <base64-encoded-jwt-secret>
